<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouth Detection</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body { margin: 0; background: black; overflow: hidden; }
    video { width: 100vw; height: 100vh; object-fit: cover; }
    #status {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 20px;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">Starting...</div>

<script>
const video = document.getElementById('video');
const statusText = document.getElementById('status');

// STEP 1: Request camera explicitly
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => {
  video.srcObject = stream;
  video.play();
  statusText.innerText = "Camera OK ✅";
  startFaceMesh();
})
.catch(err => {
  statusText.innerText = "Camera FAILED ❌: " + err.message;
  console.error("Camera error:", err);
});

// STEP 2: Initialize MediaPipe Face Mesh
function startFaceMesh() {
  const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  faceMesh.onResults(results => {
    if (!results.multiFaceLandmarks) {
      statusText.innerText = "No face detected";
      return;
    }

    const landmarks = results.multiFaceLandmarks[0];
    const upper = landmarks[13]; // upper lip
    const lower = landmarks[14]; // lower lip
    const mouthOpen = Math.abs(upper.y - lower.y);

    // Log distance for debugging
    console.log("Mouth distance:", mouthOpen);

    if (mouthOpen > 0.02) {
      statusText.innerText = "OPEN 😁";
      window.parent.postMessage("OPEN", "*");
    } else {
      statusText.innerText = "CLOSED 😐";
      window.parent.postMessage("CLOSED", "*");
    }
  });

  // STEP 3: Use MediaPipe Camera Utils for frame loop
  const cameraMP = new Camera(video, {
    onFrame: async () => { await faceMesh.send({ image: video }); },
    width: 640,
    height: 480
  });

  cameraMP.start();
}
</script>

</body>
</html>
